<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agregar Producto</title>
  <link rel="stylesheet" href="agregar_producto.css">
</head>

<body>
  <header class="header">
    <h1>Agregar producto</h1>
  </header>

  <main class="formulario">
    <form id="formAgregar" enctype="multipart/form-data">

      <input type="text" placeholder="Nombre del producto" name="Nombre_P" required>

      <select name="Clasificacion" required>
        <option value="">Selecciona una clasificación</option>
        <option value="Original">Original</option>
        <option value="Patata">Patata</option>
        <option value="Crunch">Crunch</option>
        <option value="Ramen">Ramen</option>
        <option value="Flamin">Flamin</option>
      </select>

      <textarea placeholder="Descripción" name="Descripcion" required></textarea>

      <input type="number" placeholder="Cantidad disponible" name="Cantidad_Disponible" required>
      <input type="number" placeholder="Cantidad mínima" name="Cantidad_Min" required>
      <input type="number" placeholder="Cantidad máxima" name="Cantidad_Max" required>

      <input type="number" placeholder="Costo base" name="Costo_Base" id="Costo_Base" step="0.01" required>

      <input type="number" placeholder="Porcentaje de ganancia" name="Porcentaje_Gan" id="Porcentaje_Gan" required>

      <input type="number" placeholder="Precio venta" name="Precio_Venta" id="Precio_Venta" readonly>

      <input type="file" name="Imagen" accept="image/*" required>

      <button type="submit">Guardar</button>
    </form>


  </main>

  <footer>
    <button class="volver" onclick="location.href='gestionar_producto.html'">Volver</button>
  </footer>

  <script src="agregar_producto.js"></script>
</body>

</html>
