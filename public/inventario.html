<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario</title>
  <link rel="stylesheet" href="inventario.css">
</head>
<body>
  <header class="header">
    <h1>Inventario</h1>
  </header>

  <main>
    <form id="formEntrada">
      <label for="producto">Producto:</label>
      <select id="producto" required></select>

      <label for="cantidad">Cantidad a agregar:</label>
      <input type="number" id="cantidad" min="1" required>

      <button type="submit">Registrar Entrada</button>
    </form>

    <h2>Listado de Inventario</h2>
    <table id="tablaInventario" border="1" aria-label="Tabla de inventario">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Descripción</th>
          <th>Disponible</th>
          <th>Mínima</th>
          <th>Máxima</th>
        </tr>
      </thead>
      <tbody>
        <!-- Filas se cargan dinámicamente -->
      </tbody>
    </table>
  </main>

  <footer>
    <button class="volver" onclick="location.href='gestionar_producto.html'">Volver</button>
  </footer>

  <script src="inventario.js"></script>
</body>
</html>
