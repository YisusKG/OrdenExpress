<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión</title>
  <link rel="stylesheet" href="style.css">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:* ws://localhost:*;">
</head>
<body>
  <div class="container">
    <div class="left">
      <h1>¡Bienvenido!</h1>
      <p>Accede con tu cuenta para hacer pedidos rápidamente.</p>
      <button onclick="location.href='registro.html'">Registrarse</button>
    </div>
    <div class="right">
      <h2>Iniciar sesión</h2>
      <form id="formLogin">
        <div class="form-group">
          <input type="text" placeholder="Usuario" id="usuario" name="usuario" required>
        </div>
        <div class="form-group">
          <input type="password" placeholder="Contraseña" id="contraseña" name="contraseña" required>
        </div>
        <button type="submit">Ingresar</button>
      </form>
    </div>
  </div>
  <script src="login.js"></script>
</body>
</html>
